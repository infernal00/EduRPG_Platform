<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="English">
  <title>English</title>
  <!-- Scroll body -->
  <rect x="14" y="16" width="36" height="34" rx="3" fill="#854F0B" opacity="0.25" stroke="#BA7517" stroke-width="1.5"/>
  <!-- Scroll rolled top -->
  <ellipse cx="32" cy="16" rx="18" ry="5" fill="#633806" opacity="0.9" stroke="#BA7517" stroke-width="1.2"/>
  <ellipse cx="32" cy="16" rx="12" ry="3" fill="#854F0B" opacity="0.7"/>
  <!-- Scroll rolled bottom -->
  <ellipse cx="32" cy="50" rx="18" ry="5" fill="#633806" opacity="0.9" stroke="#BA7517" stroke-width="1.2"/>
  <ellipse cx="32" cy="50" rx="12" ry="3" fill="#854F0B" opacity="0.7"/>
  <!-- Text lines on scroll -->
  <line x1="20" y1="25" x2="44" y2="25" stroke="#EF9F27" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="20" y1="30" x2="44" y2="30" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="35" x2="38" y2="35" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="40" x2="44" y2="40" stroke="#EF9F27" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Speech bubble -->
  <rect x="36" y="6" width="22" height="14" rx="5" fill="#BA7517" opacity="0.9"/>
  <polygon points="42,20 38,26 46,20" fill="#BA7517" opacity="0.9"/>
  <!-- Dots in speech bubble -->
  <circle cx="43" cy="13" r="1.8" fill="#FAC775"/>
  <circle cx="47" cy="13" r="1.8" fill="#FAC775"/>
  <circle cx="51" cy="13" r="1.8" fill="#FAC775"/>
  <!-- Quill pen nib hint -->
  <path d="M8 54 C10 46, 14 38, 18 32" stroke="#FAC775" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M8 54 C12 50, 16 44, 18 32" stroke="#EF9F27" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
  <polygon points="18,32 14,30 20,28" fill="#FAC775" opacity="0.8"/>
</svg>
