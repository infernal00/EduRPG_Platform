<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Programming">
  <title>Programming</title>
  <!-- Terminal window frame -->
  <rect x="6" y="12" width="52" height="38" rx="5" fill="#1D9E75" opacity="0.12" stroke="#1D9E75" stroke-width="1.5"/>
  <!-- Terminal title bar -->
  <rect x="6" y="12" width="52" height="10" rx="5" fill="#0F6E56" opacity="0.7"/>
  <rect x="6" y="17" width="52" height="5" fill="#0F6E56" opacity="0.7"/>
  <!-- Title bar dots -->
  <circle cx="14" cy="17" r="2" fill="#D85A30" opacity="0.9"/>
  <circle cx="21" cy="17" r="2" fill="#BA7517" opacity="0.9"/>
  <circle cx="28" cy="17" r="2" fill="#1D9E75" opacity="0.9"/>
  <!-- Code lines: angle brackets / chevrons -->
  <path d="M14 32 L10 36 L14 40" stroke="#5DCAA5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 32 L26 36 L22 40" stroke="#5DCAA5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash between brackets -->
  <line x1="19" y1="31" x2="17" y2="41" stroke="#9FE1CB" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Crystal gem (top right corner, code rune) -->
  <polygon points="50,8 57,16 50,24 43,16" fill="#085041" stroke="#1D9E75" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="50,11 54,16 50,21 46,16" fill="#1D9E75" opacity="0.7"/>
  <line x1="46" y1="16" x2="54" y2="16" stroke="#9FE1CB" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="11" x2="50" y2="21" stroke="#9FE1CB" stroke-width="1" opacity="0.4"/>
  <!-- Text cursor -->
  <rect x="30" y="33" width="2" height="8" rx="1" fill="#9FE1CB"/>
  <!-- Horizontal code stubs -->
  <line x1="34" y1="36" x2="44" y2="36" stroke="#085041" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="34" y1="41" x2="50" y2="41" stroke="#0F6E56" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
