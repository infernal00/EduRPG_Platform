<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Physics">
  <title>Physics</title>
  <!-- Glow aura -->
  <circle cx="32" cy="32" r="20" fill="#378ADD" opacity="0.12"/>
  <!-- Atom orbit 1 - horizontal ellipse -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="#378ADD" stroke-width="1.6" fill="none" opacity="0.85"/>
  <!-- Atom orbit 2 - rotated 60deg -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="#85B7EB" stroke-width="1.6" fill="none" opacity="0.75"
           transform="rotate(60 32 32)"/>
  <!-- Atom orbit 3 - rotated 120deg -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="#B5D4F4" stroke-width="1.6" fill="none" opacity="0.65"
           transform="rotate(120 32 32)"/>
  <!-- Nucleus -->
  <circle cx="32" cy="32" r="5.5" fill="#378ADD"/>
  <circle cx="32" cy="32" r="3.5" fill="#85B7EB"/>
  <circle cx="32" cy="32" r="1.8" fill="#E6F1FB"/>
  <!-- Electrons (on orbit intersections) -->
  <circle cx="58" cy="32" r="2.5" fill="#378ADD"/>
  <circle cx="19" cy="10.5" r="2.5" fill="#85B7EB"/>
  <circle cx="19" cy="53.5" r="2.5" fill="#B5D4F4"/>
  <!-- Energy spark lines (top right) -->
  <path d="M46 8 L44 14 L48 14 L44 22" stroke="#EF9F27" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
