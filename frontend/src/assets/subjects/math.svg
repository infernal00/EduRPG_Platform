<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Mathematics">
  <title>Mathematics</title>
  <!-- Hexagonal geometry background -->
  <polygon points="32,6 52,17 52,39 32,50 12,39 12,17" fill="#534AB7" opacity="0.18" stroke="#7F77DD" stroke-width="1" stroke-linejoin="round"/>
  <!-- Inner triangle -->
  <polygon points="32,16 46,38 18,38" fill="none" stroke="#AFA9EC" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>
  <!-- Compass pivot -->
  <circle cx="32" cy="20" r="3" fill="#7F77DD"/>
  <!-- Left compass leg -->
  <line x1="32" y1="20" x2="20" y2="46" stroke="#7F77DD" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right compass leg -->
  <line x1="32" y1="20" x2="44" y2="46" stroke="#AFA9EC" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Compass foot dots -->
  <circle cx="20" cy="46" r="2.5" fill="#534AB7"/>
  <circle cx="44" cy="46" r="2.5" fill="#7F77DD"/>
  <!-- Arc drawn by compass -->
  <path d="M17 38 A17 17 0 0 1 47 38" stroke="#CECBF6" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Cross-bar on compass -->
  <line x1="24" y1="33" x2="40" y2="33" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pi symbol hint (dot decoration) -->
  <circle cx="32" cy="54" r="1.5" fill="#7F77DD" opacity="0.8"/>
  <circle cx="26" cy="54" r="1.5" fill="#7F77DD" opacity="0.5"/>
  <circle cx="38" cy="54" r="1.5" fill="#7F77DD" opacity="0.5"/>
</svg>
