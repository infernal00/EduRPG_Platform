<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Knowledge">
  <title>Knowledge</title>
  <!-- Orb glow outer ring -->
  <circle cx="32" cy="36" r="18" fill="#534AB7" opacity="0.18"/>
  <!-- Book base left page -->
  <path d="M10 44 L10 20 C10 20, 30 22, 30 24 L30 48 C30 48, 10 46, 10 44Z"
        fill="#3C3489" opacity="0.9" stroke="#7F77DD" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Book base right page -->
  <path d="M54 44 L54 20 C54 20, 34 22, 34 24 L34 48 C34 48, 54 46, 54 44Z"
        fill="#26215C" opacity="0.9" stroke="#534AB7" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Book spine -->
  <line x1="32" y1="24" x2="32" y2="48" stroke="#AFA9EC" stroke-width="2" stroke-linecap="round"/>
  <!-- Lines on left page -->
  <line x1="14" y1="29" x2="27" y2="30" stroke="#7F77DD" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="14" y1="34" x2="27" y2="35" stroke="#7F77DD" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="39" x2="25" y2="40" stroke="#7F77DD" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <!-- Lines on right page -->
  <line x1="37" y1="30" x2="50" y2="29" stroke="#534AB7" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <line x1="37" y1="35" x2="50" y2="34" stroke="#534AB7" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <line x1="39" y1="40" x2="50" y2="39" stroke="#534AB7" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
  <!-- Magic knowledge orb floating above book -->
  <circle cx="32" cy="16" r="9" fill="#534AB7" opacity="0.85" stroke="#AFA9EC" stroke-width="1.2"/>
  <circle cx="32" cy="16" r="6" fill="#7F77DD" opacity="0.7"/>
  <circle cx="32" cy="16" r="3.5" fill="#CECBF6" opacity="0.9"/>
  <circle cx="32" cy="16" r="1.5" fill="#EEEDFE"/>
  <!-- Sparkle rays from orb -->
  <line x1="32" y1="5" x2="32" y2="3"  stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="8" x2="42" y2="6"  stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="16" x2="45" y2="16" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="42" y2="26" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="22" y2="6"  stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="16" x2="19" y2="16" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="22" y2="26" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
